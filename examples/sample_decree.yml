user_group:
- name: Templar Users
  gui_access: INTERNAL
  host_groups:
  - name: Linux servers
    permission: NONE
  - name: Virtual machines
    permission: READ
  - name: Templar Hosts
    permission: READ
  template_groups:
  - name: Templar Templates
    permission: READ_WRITE
- name: Templar Disabled
  gui_access: DISABLED
  users_status: DISABLED
saml:
  idp_entityid: http://www.okta.com/example
  sp_entityid: zabbix
  sso_url: https://example.okta.com/sso/saml
  username_attribute: usrEmail
  encrypt_nameid: 'NO'
  encrypt_assertions: 'YES'
  sign_messages: 'NO'
  sign_assertions: 'YES'
  sign_authn_requests: 'NO'
  sign_logout_requests: 'NO'
  sign_logout_responses: 'NO'
  provision_status: ENABLED
  group_name: groups
  user_username: firstName
  user_lastname: lastName
  disabled_user_group: Templar Disabled
  provision_groups:
  - name: zabbix-admins
    role: Super admin role
    user_groups:
    - Templar Users
  provision_media:
  - name: Email
    attribute: email
    type: Email
  scim_status: DISABLED
  saml_case_sensitive: 'YES'
add_user:
- username: zbx-admin
  role: Super admin role
  groups:
  - Templar Users
  medias:
  - type: Email
    sendto: alerts@example.com
    severity: AVERAGE,HIGH,DISASTER
  - type: Slack
    sendto: '#ops-alerts'
  password: ${ZBX_ADMIN_PASSWORD}
- username: zbx-service
  role: User role
  groups:
  - Templar Users
  medias:
  - type: Slack
    sendto: '1'
  password: ${ZBX_SERVICE_PASSWORD}
  token:
    name: monitoring-ro
    store_at: .secrets/monitoring-ro.token
    expires_at: NEVER
  force_token: true
actions:
- eventsource: 0
  name: Test Action
  status: 0
  operations:
  - operationtype: 0
    opmessage:
      default_msg: 0
      message: Test message 0
    opmessage_grp:
    - usrgrpid: Templar Users
    esc_step_from: 1
    esc_step_to: 1
    esc_period: 0
  - operationtype: 0
    opmessage:
      default_msg: 0
      mediatypeid: Slack
      message: Test message 120
    opmessage_grp:
    - usrgrpid: Templar Users
    esc_step_from: 1
    esc_step_to: 1
    esc_period: 120
  - operationtype: 0
    opmessage:
      default_msg: 1
    opmessage_usr:
    - userid: zbx-service
    opmessage_grp:
    - usrgrpid: Templar Users
    esc_step_from: 1
    esc_step_to: 1
    esc_period: 3h
  - operationtype: 0
    opmessage:
      default_msg: 0
      message: Test message String Macro
    opmessage_grp:
    - usrgrpid: Templar Users
    esc_step_from: 1
    esc_step_to: 1
    esc_period: '{$TEST_DURATION}'
  recovery_operations:
  - operationtype: 0
    opmessage:
      default_msg: 0
      message: Resolved
    opmessage_grp:
    - usrgrpid: Templar Users
  - operationtype: 0
    opmessage:
      default_msg: 1
    opmessage_usr:
    - userid: zbx-service
  update_operations:
  - operationtype: 0
    opmessage:
      default_msg: 0
      message: Acknowledged
    opmessage_grp:
    - usrgrpid: Templar Users
  - operationtype: 0
    opmessage:
      default_msg: 1
    opmessage_usr:
    - userid: zbx-service
  esc_period: '{$DEFAULT_DURATION_MACRO}'
  pause_symptoms: 0
  pause_suppressed: 1
  notify_if_canceled: 1
  filter:
    evaltype: 3
    formula: A or B
    conditions:
    - conditiontype: 0
      operator: 0
      value: Templar Hosts
      formulaid: A
    - conditiontype: 13
      operator: 0
      value: Test Template
      formulaid: B
- eventsource: 2
  name: Test Registration
  status: 1
  operations:
  - operationtype: 2
  - operationtype: 4
    opgroup:
    - groupid: Templar Hosts
  - operationtype: 6
    optemplate:
    - templateid: Test Template
  - operationtype: 0
    opmessage:
      default_msg: 0
      message: Registered
    opmessage_grp:
    - usrgrpid: Templar Users
    esc_step_from: 1
    esc_step_to: 1
    esc_period: 0
  filter:
    evaltype: 3
    formula: A
    conditions:
    - conditiontype: 24
      operator: 2
      value: test
      formulaid: A
encryption:
  host_defaults:
    connect: UNENCRYPTED
  hosts:
  - host: Templar Host
    connect: PSK
    accept: UNENCRYPTED, PSK
    psk_identity: zbxtemplar_psk
    psk: ${ZBX_ENCRYPTED_PSK}
