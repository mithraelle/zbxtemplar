add_user:
- username: zbx-admin
  role: Super admin role
  groups:
  - Templar Users
  medias:
  - type: Email
    sendto: alerts@example.com
    severity: AVERAGE,HIGH,DISASTER
  - type: Slack
    sendto: '#ops-alerts'
  password: ${ZBX_ADMIN_PASSWORD}
- username: zbx-service
  role: User role
  groups:
  - Templar Users
  medias:
  - type: Slack
    sendto: '1'
  password: ${ZBX_SERVICE_PASSWORD}
  token:
    name: monitoring-ro
    store_at: .secrets/monitoring-ro.token
    expires_at: NEVER
  force_token: true
