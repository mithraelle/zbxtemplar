user_group:
- name: Templar Users
  gui_access: INTERNAL
  host_groups:
  - name: Linux servers
    permission: NONE
  - name: Virtual machines
    permission: READ
  - name: Templar Hosts
    permission: READ
  template_groups:
  - name: Templar Templates
    permission: READ_WRITE
add_user:
- username: zbx-admin
  role: Super admin role
  password: ${ZBX_ADMIN_PASSWORD}
  groups:
  - Templar Users
  medias:
  - type: Email
    sendto: alerts@example.com
    severity: AVERAGE,HIGH,DISASTER
  - type: Slack
    sendto: '#ops-alerts'
- username: zbx-service
  role: User role
  password: ${ZBX_SERVICE_PASSWORD}
  groups:
  - Templar Users
  token:
    name: monitoring-ro
    expires_at: NEVER
    store_at: .secrets/monitoring-ro.token
  force_token: true
actions:
- eventsource: 0
  name: Test Action
  operations:
  - operationtype: 0
    opmessage:
      default_msg: 0
      message: Test message
    opmessage_grp:
    - usrgrpid: Templar Users
    esc_step_from: 1
    esc_step_to: 1
    esc_period: 0
  filter:
    evaltype: 3
    formula: A or B
    conditions:
    - conditiontype: 0
      operator: 0
      value: Templar Hosts
      formulaid: A
    - conditiontype: 13
      operator: 0
      value: Test Template
      formulaid: B
- eventsource: 2
  name: Test Registration
  operations:
  - operationtype: 2
  - operationtype: 6
    optemplate:
    - templateid: Test Template
  filter:
    evaltype: 3
    formula: A
    conditions:
    - conditiontype: 24
      operator: 2
      value: test
      formulaid: A
